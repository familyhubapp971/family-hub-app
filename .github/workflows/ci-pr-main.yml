# ci-pr-main: pre-promotion CI for the staging → main batch promotion
# (currently dormant per the staging-only bootstrap policy in CLAUDE.md;
# wakes up automatically when the policy lifts and a staging → main PR
# is opened).
#
# Validates the full release with k6 smoke + e2e matrix BEFORE anything
# lands on main. webkit project removed from matrix to match the current
# playwright.config.ts (only chromium + mobile-chrome declared).

name: ci-pr-main

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ci-pr-main-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10.32.0'

jobs:
  e2e-full:
    name: Browser tests — ${{ matrix.browser }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, mobile-chrome]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: familyhub_test
          POSTGRES_USER: fh_test
          POSTGRES_PASSWORD: fh_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 1s
          --health-timeout 5s
          --health-retries 30
    env:
      DATABASE_URL: postgres://fh_test:fh_test@localhost:5432/familyhub_test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        env:
          BROWSER: ${{ matrix.browser }}
        run: |
          case "$BROWSER" in
            mobile-chrome) npx playwright install --with-deps chromium ;;
            *) npx playwright install --with-deps "$BROWSER" ;;
          esac
      - name: Run e2e (project=${{ matrix.browser }})
        env:
          PROJECT: ${{ matrix.browser }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: pnpm exec playwright test --config tests/e2e/playwright.config.ts --project "$PROJECT"
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-pr-main-${{ matrix.browser }}
          path: tests/e2e/playwright-report/

  perf-smoke:
    name: Performance smoke (k6, 30s)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: familyhub_test
          POSTGRES_USER: fh_test
          POSTGRES_PASSWORD: fh_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 1s
          --health-timeout 5s
          --health-retries 30
    env:
      DATABASE_URL: postgres://fh_test:fh_test@localhost:5432/familyhub_test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - uses: grafana/setup-k6-action@v1
      - name: Boot api in background
        run: |
          NODE_ENV=test PORT=3001 LOG_LEVEL=error \
            pnpm --filter @familyhub/api dev > /tmp/api.log 2>&1 &
          API_PID=$!
          echo "API_PID=$API_PID" >> "$GITHUB_ENV"
          for i in {1..30}; do
            if curl -sf http://localhost:3001/health >/dev/null; then exit 0; fi
            sleep 1
          done
          echo "✗ api never responded — last 50 log lines:"; tail -n 50 /tmp/api.log || true
          exit 1
      - run: pnpm perf:smoke
      - name: Stop api
        if: always()
        run: |
          if [ -n "${API_PID:-}" ]; then kill "$API_PID" 2>/dev/null || true; fi
      - if: failure()
        uses: actions/upload-artifact@v4
        with: { name: api-log-pr-main-perf, path: /tmp/api.log, retention-days: 7 }
