# Local dev Postgres. Listens on port 5432 (matches the default in
# .env.example: postgres://localhost:5432/familyhub_dev).
#
# Test Postgres lives separately in docker-compose.test.yml on :5433
# so dev and integration tests can run side-by-side without colliding.
#
# Lifecycle:
#   docker compose up -d         # start, daemonised
#   docker compose down          # stop + remove containers
#   docker compose down -v       # ALSO drop the named volume (fresh DB)
#
# Or via the convenience wrappers in scripts/dev / package.json:
#   ./scripts/dev                # one-command: db + migrations + api + web
#   pnpm dev:up                  # just the db
#   pnpm dev:down                # stop the db

services:
  postgres:
    image: postgres:16-alpine
    container_name: familyhub-postgres-dev
    environment:
      POSTGRES_DB: familyhub_dev
      POSTGRES_USER: familyhub
      POSTGRES_PASSWORD: familyhub
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U familyhub -d familyhub_dev"]
      interval: 1s
      timeout: 5s
      retries: 30
    volumes:
      - familyhub-postgres-dev-data:/var/lib/postgresql/data
    # No restart policy in dev — contributor controls lifecycle via
    # `pnpm dev:up` / `pnpm dev:down`; auto-restart-after-reboot is a
    # surprise more than a feature on a workstation.
    restart: 'no'

volumes:
  familyhub-postgres-dev-data:
    name: familyhub-postgres-dev-data
